<!DOCTYPE html>
<html>
<head>
    <title>Communication App</title>
</head>
<body>
    <h1>Current Role: <span id="role">{{ role }}</span></h1>
    
    <form action="/set_role/" method="post">
        <label>
            <input type="radio" name="new_role" value="sender" {% if role == "sender" %} checked {% endif %}>
            Set as Sender
        </label>
        <label>
            <input type="radio" name="new_role" value="receiver" {% if role == "receiver" %} checked {% endif %}>
            Set as Receiver
        </label>
        <button type="submit">Change Role</button>
    </form>

    <form action="/send_message/" method="post">
        <input type="text" name="message" placeholder="Enter message" required>
        <button type="submit">Send Message</button>
    </form>
</body>
</html>
